# Forum default roster: domain-neutral, plainly named capability lanes.
#
# Capabilities are data, not code: one WorkerActor implementation serves every
# lane. model_tier is abstract (cheap, capable, frontier); an executor maps a
# tier to a concrete model. executor names which Executor plug-in runs the lane
# ("cli" runs a model CLI through the SubprocessExecutor). Keywords are single
# lowercase tokens, because the lexical router matches them against individual
# request words; a multi-word or hyphenated keyword would never match.

# --- engineering ---

[[agent]]
name = "backend"
category = "engineering"
domain = "Full-stack backend and application services"
keywords = ["api", "database", "server", "endpoint", "auth"]
model_tier = "capable"
executor = "cli"

